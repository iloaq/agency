name: Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # NEXT_PUBLIC_* подставляются на этапе сборки: https://nextjs.org/docs/app/guides/environment-variables#bundling-environment-variables-for-the-browser
      - name: Build application
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_YANDEX_METRIKA_ID: ${{ secrets.NEXT_PUBLIC_YANDEX_METRIKA_ID }}
          NEXT_PUBLIC_CHATWOOT_BASE_URL: ${{ secrets.NEXT_PUBLIC_CHATWOOT_BASE_URL }}
          NEXT_PUBLIC_CHATWOOT_WEBSITE_TOKEN: ${{ secrets.NEXT_PUBLIC_CHATWOOT_WEBSITE_TOKEN }}
        run: npm run build --if-present

      - name: Run tests
        run: npm run test --if-present

      # Source: https://github.com/caprover/deploy-from-github/blob/master/README.md
      - name: Create deployment package
        uses: a7ul/tar-action@v1.1.0
        with:
          command: c
          cwd: "./"
          files: |
            .next/standalone/
            .next/static/
            public/
            Dockerfile
            captain-definition
          outPath: deploy.tar

      # Раньше было refs/heads/main — при ветке master деплой не выполнялся.
      - name: Deploy App to CapRover
        if: github.event_name == 'push'
        uses: caprover/deploy-from-github@v1.0.1
        with:
          server: "${{ secrets.CAPROVER_SERVER }}"
          app: "${{ secrets.APP_NAME }}"
          token: "${{ secrets.APP_TOKEN }}"
